<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 16px 0;
        }
        .flashcard {
            padding: 12px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            border-left: 3px solid #2196F3;
        }
        .front {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .back {
            font-size: 14px;
            color: #666;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>📚 VocabVault</h1>
    <div id="flashcards"></div>
    <script src="popup.js"></script>
</body>
</html>
